name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paperxent
          POSTGRES_PASSWORD: paperxent
          POSTGRES_DB: paperxent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paperxent -d paperxent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://paperxent:paperxent@localhost:5432/paperxent?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npx prisma migrate deploy --schema packages/database/prisma/schema.prisma
      - run: npm run test
      - run: npm run lint
      - run: npm run typecheck
